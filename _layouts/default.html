<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title> Dr. Diego García-Zamora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --uja-blue: rgb(87, 110, 48); --accent-gold: #d6d9a9; }
        /* Copia aquí todos los estilos de tu <style> actual */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        header { background-color: var(--uja-blue); color: white; padding: 2rem; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 20px 20px; }
        nav { background: white; display: flex; justify-content: center; border-bottom: 2px solid var(--accent-gold); position: sticky; top: 0; }
        nav a { padding: 1rem 2rem; text-decoration: none; color: var(--uja-blue); font-weight: bold; }
        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        /* Cajas de contenido */
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--uja-blue); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .tag-box {
            background: #f9f9f9;
            border: 1px solid var(--uja-blue);
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Dr. Diego García-Zamora</h1>
            <p>Profesor Ayudante Doctor</p>
            <p><i class="fas fa-university"></i> Departamento de Matemáticas | Universidad de Jaén</p> 
        </div>
        <div style="border: 3px solid var(--accent-gold); border-radius: 50%; overflow: hidden; width: 120px; height: 120px;">
            <img src="/img/perfil.jpg" alt="Foto" style="width: 100%;">
        </div>
    </header>

    <nav>
        <a href="{{ '/' | relative_url }}">Perfil</a>
        <a href="{{ '/docencia' | relative_url }}">Docencia</a>
        <a href="{{ '/investigacion' | relative_url }}">Investigación</a>
        <a href="{{ '/divulgación' | relative_url }}">Divulgación</a>
    </nav>

    <div class="container">
        {{ content }}
    </div>

    <footer style="text-align: center; color: gray; padding: 20px;">
    <hr style="width: 80%; opacity: 0.3;">
    <p><i>"En matemáticas no entiendes las cosas. Simplemente te acostumbras a ellas."</i></p>
    <strong>John von Neumann</strong> 
</footer>
</body>
</html>
